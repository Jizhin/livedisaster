name: Keep Render Backend Alive

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping backend
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://livedisaster-backend.onrender.com/api/reports/feed?limit=1")
          echo "Response: $STATUS"
          if [ "$STATUS" -lt 200 ] || [ "$STATUS" -ge 500 ]; then
            echo "Ping failed with status $STATUS"
            exit 1
          fi
