[alembic]
script_location = alembic
prepend_sys_path = .
# This default URL is overridden at runtime by env.py which reads DATABASE_URL from the environment.
# For local non-Docker development, set DATABASE_URL in your shell or a .env file.
sqlalchemy.url = postgresql+psycopg://postgres:password@localhost:5432/kerala_live

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S