version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: livekerala_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: kerala_live
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: .
    container_name: livekerala_backend
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - uploads_data:/app/uploads
    environment:
      - DATABASE_URL=postgresql+psycopg://postgres:password@db:5432/kerala_live
      - PYTHONUNBUFFERED=1
    depends_on:
      db:
        condition: service_healthy
    # Run migrations, seed districts, refresh real weather alerts, start server
    command: >
      sh -c "
        alembic upgrade head &&
        python seed.py &&
        uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
      "

  frontend:
    build: ../frontend
    container_name: livekerala_frontend
    ports:
      - "5173:5173"
    volumes:
      - ../frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_PROXY_TARGET=http://backend:8000
    depends_on:
      - backend

volumes:
  postgres_data:
  uploads_data: